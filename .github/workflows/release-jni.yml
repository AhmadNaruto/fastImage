name: Build and Release JNI Libraries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android Libraries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi
            i686-linux-android
            x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      # Compiles all targets and outputs them to ./jniLibs/ folder structure
      - name: Build JNI Libraries
        run: |
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86 -t x86_64 -o ./jniLibs build --release -p fast_image_resize_jni

      # Zips the jniLibs directory containing all .so architectures
      - name: Package Libraries
        run: |
          zip -r fast_image_resize_jni_android.zip jniLibs

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jni-libraries
          path: fast_image_resize_jni_android.zip

  create-release:
    name: Create GitHub Release
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: jni-libraries

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: fast_image_resize_jni_android.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
